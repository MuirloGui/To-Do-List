<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Work+Sans&display=swap"
      rel="stylesheet"
    />
     <link rel="stylesheet" href="index.css">
     <link rel="stylesheet" href="responsivo.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="Quer uma lista de afazeres facil e praticá? Aqui está!"
    />
    <script src="index.js" defer ></script>
    <title>To Do List</title>
  </head>
  <body>
    <main>
      <header class="global-header">
        <h1 class="text_global_style">
          Coloque suas tarefas em uma lista simples e direta!
        </h1>
      </header>
      <section class="main-container-section">
        <div class="content-create-tasks">
          <form >
            <h2 class="text_global_style">Vamos lá?!</h2>
            <label for="textarea_form">Coloque seus afazeres aqui.</label>
            <textarea name="textarea_form"
              rows="3"
              id="textarea_form"
              placeholder="No que está pensando?"
              required></textarea>
            <button type="button"  class="btn-style" id="btn_form" >Salvar</button>
          </form>
        </div>
      </section>

      <section class="receive-container_section">
        <div class="receive-content">
          
           <header class="receive_task_header">
              <h2 clas="text_global_style">Sua lista de tarefas</h3>
                 <button type="button" class="btn-style" id="btn_filter" title="Filtrar">
                    &#9866
                  </button>
                <div class="hidden-menu"></div>
            </header>    
        
          <fieldset class="receive_user_task-fieldset">
             <legend class="user_task user_task-legend">
              #Em andamento!
            </legend>
            <ul id="receive_user_task-create"></ul>
          </fieldset>
        </div>
      </section>
    </main>
  </body>
</html>
